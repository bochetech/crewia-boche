tasks:
  # ---------------------------------------------------------------------------
  # Tarea 1: Conversación Natural y Asistencia Estratégica
  # ---------------------------------------------------------------------------
  - id: conversation_assist
    title: "Asistencia Conversacional y Desarrollo de Contexto"
    owner: "triage_analyst"
    # Configuración de LLM para esta tarea
    llm_config:
      enable_reasoning: false  # Sin <think> blocks para respuestas rápidas
      max_tokens: 200          # Respuestas MUY breves (1-2 oraciones)
      temperature: 0.7         # Algo de creatividad
      timeout: 60              # 60 segundos (30s era muy poco para qwen3.5-9b)
    description: |
      Pregunta: {user_message}
      
      Contexto: {conversation_history}

    expected_result: |
      Una respuesta útil y profesional.

  # ---------------------------------------------------------------------------
  # Tarea 2: Triaje Analítico Automático de correos entrantes
  # ---------------------------------------------------------------------------
  - id: triage_email
    title: "Triaje Analítico de Correo Entrante"
    owner: "triage_analyst"
    # Configuración de LLM para esta tarea
    llm_config:
      enable_reasoning: true   # Con <think> blocks para análisis profundo
      max_tokens: 1000         # Respuestas completas con JSON
      temperature: 0.7         # Balance creatividad/precisión
      timeout: 120             # 2 minutos para reasoning complejo
    description: |
      Eres Nia. El siguiente correo ya está disponible — NO uses herramientas para leerlo.
      
      CORREO A ANALIZAR:
      {email_entrante}
      
      Clasifica el correo y ejecuta las acciones necesarias según estos criterios:
      
      CLASIFICACIÓN:
      - STRATEGIC: propone proyecto de software, automatización, integración, requiere decisión del equipo,
        toca eCommerce DTC, mantenimiento, carriers, SAP, Bókun, fidelización, eficiencia de costos.
      - JUNK: spam, publicidad masiva o mensaje personal sin implicación operativa.
      Ante la duda, clasifica como STRATEGIC.
      
      ACCIONES para STRATEGIC:
      - ConfluenceUpsertTool: si contiene info técnica o propuestas a preservar (space: "TECH")
      - EmailDraftingTool: si requiere respuesta o colaboración de otro rol
      - LeaderNotificationTool: SIEMPRE para STRATEGIC (channel: telegram)
      
      ACCIONES para JUNK:
      - LeaderNotificationTool: solo para informar el descarte
      
      Responde EXCLUSIVAMENTE con este JSON (sin texto antes ni después):
      {
        "classification": "STRATEGIC" | "JUNK",
        "reasoning": "explicación breve",
        "email_summary": {"sender": "...", "subject": "...", "key_topics": ["..."]},
        "actions_taken": [{"tool": "...", "status": "ok|error", "details": "..."}],
        "pending_approvals": ["..."],
        "discarded": true | false,
        "discard_reason": "solo si JUNK"
      }

    expected_result: |
      JSON estructurado con classification, reasoning, email_summary, actions_taken,
      pending_approvals y discard_reason (si aplica).

  # ---------------------------------------------------------------------------
  # Tareas anteriores — mantenidas para compatibilidad backward
  # ---------------------------------------------------------------------------
  - id: task_001
    title: "Analizar logs de interacción"
    owner: "analyst"
    description: "Extraer métricas clave (intents, latencia, tokens) y devolver un resumen."
    expected_result: "JSON con métricas agregadas y recomendaciones de optimización de prompts."

  - id: task_002
    title: "Diseño arquitectónico para pipeline de prompts"
    owner: "architect"
    description: "Proponer una arquitectura modular para manejo de múltiples LLMs, con análisis de costos y optimización de tokens."
    expected_result: "Objeto JSON estructurado con decisiones, rationale, estimación de tokens y siguientes pasos."
